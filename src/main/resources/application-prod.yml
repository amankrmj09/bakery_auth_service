spring:
  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT_AUTH}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
jwt:
  secret: ${JWT_SECRET}
app:
  admin:
    first-name: ${ADMIN_FIRST_NAME}
    last-name: ${ADMIN_LAST_NAME}
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    phone: ${ADMIN_PHONE}
