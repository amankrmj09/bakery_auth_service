server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: bakery-auth-service
  profiles:
    active: ${ACTIVE_PROFILE:dev}
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8081}"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "1"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
